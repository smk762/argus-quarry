# multi-person harvesting and folder layout, short enough to stay fast and
# licence-safe. Everyone here is long-deceased with abundant public-domain
# portraits on Wikimedia Commons. Scale toward the 5–7k target later via the
# optional Wikidata SPARQL harvester (`people --from-wikidata`, Phase 2).
