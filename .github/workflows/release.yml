name: Release to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test-install:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install wheel and smoke-test import
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install dist/*.whl
          uv run --no-sync python -c "from argus_quarry import PortraitRecord, __version__; print(f'argus-quarry {__version__} OK')"

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: test-install
    environment: testpypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    runs-on: ubuntu-latest
    # Ordered *after* the TestPyPI rehearsal so its outcome is visible first, but
    # deliberately not gated on it. A TestPyPI-only fault — a missing trusted
    # publisher, an index outage — must not silently withhold the real release:
    # that failure mode shipped argus-proof images for two tags with no wheel on
    # PyPI, and nothing surfaced it because publish-image is independent.
    # Only the build + install gate is required; a TestPyPI failure still marks
    # the whole run failed, so the problem stays loud.
    needs: [test-install, publish-testpypi]
    if: "!cancelled() && needs.test-install.result == 'success'"
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-image:
    runs-on: ubuntu-latest
    needs: test-install
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/argus-quarry
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      # The base image has no git, so pass the version in via build-arg
      # (SETUPTOOLS_SCM_PRETEND_VERSION) rather than relying on .git history.
      #
      # Build locally first and smoke-test that the image can actually serve —
      # the 0.2.0 tags shipped without the [server] extra and would have failed
      # here (issue #3). Only then push; the second build is a cache hit.
      - name: Build image locally for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: argus-quarry:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the server
        run: |
          docker run -d --name quarry-smoke -p 8102:8102 argus-quarry:smoke
          # Poll liveness, not readiness: the image ships with no pool, so it is
          # deliberately live-but-not-ready. /health must not depend on the DB or
          # no data-less image could ever publish (issue #10).
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8102/health; then ok=1; break; fi
            sleep 1
          done
          echo
          # And confirm the split holds: an empty pool is correctly unready.
          ready=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8102/ready || true)
          docker logs quarry-smoke
          docker rm -f quarry-smoke >/dev/null
          test -n "$ok" || { echo "::error::server did not become live"; exit 1; }
          test "$ready" = "503" || { echo "::error::empty pool should be unready, got $ready"; exit 1; }
      - name: Smoke-test the CLI entrypoint still works
        run: docker run --rm argus-quarry:smoke --help
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
